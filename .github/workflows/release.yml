name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. "0.1.0", "patch", "minor", "major")'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, zip
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Validate monorepo
        run: vendor/bin/monorepo-builder validate

      - name: Merge package configs
        run: vendor/bin/monorepo-builder merge

      - name: Update branch alias for release
        run: vendor/bin/monorepo-builder package-alias || echo "Skipping package-alias (no existing tags)"

      - name: Release
        run: vendor/bin/monorepo-builder release ${{ inputs.version }}

      - name: Resolve release tag
        id: tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Trigger split workflow for tag
        run: gh workflow run split.yml -f tag=${{ steps.tag.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
